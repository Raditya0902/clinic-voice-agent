<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Clinic Voice Agent Architecture</title>
  <desc id="desc">A real-time voice pipeline from caller to Twilio, FastAPI, Deepgram, LangGraph agents, ElevenLabs, SQLite, clinic knowledge, and Streamlit dashboard.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #dbe4ee; stroke-width: 1.5; filter: url(#shadow); }
      .box { stroke-width: 1.5; rx: 10; ry: 10; }
      .title { font: 700 30px Inter, "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px Inter, "Segoe UI", Arial, sans-serif; fill: #475569; }
      .label { font: 700 17px Inter, "Segoe UI", Arial, sans-serif; fill: #111827; }
      .small { font: 500 13px Inter, "Segoe UI", Arial, sans-serif; fill: #475569; }
      .tiny { font: 600 12px Inter, "Segoe UI", Arial, sans-serif; fill: #64748b; letter-spacing: 0; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2.3; marker-end: url(#arrow); }
      .soft-arrow { fill: none; stroke: #64748b; stroke-width: 1.9; marker-end: url(#arrow); stroke-dasharray: 6 6; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="640"/>
  <rect class="panel" x="36" y="30" width="1128" height="580" rx="24" ry="24"/>

  <text class="title" x="70" y="76">Clinic Voice Agent Architecture</text>
  <text class="subtitle" x="70" y="104">Raw Twilio media stream with real-time STT, LangGraph orchestration, TTS playback, scheduling, and masked ops monitoring.</text>

  <rect class="box" x="70" y="146" width="140" height="86" fill="#ecfeff" stroke="#0891b2"/>
  <text class="label" x="140" y="181" text-anchor="middle">Caller</text>
  <text class="small" x="140" y="204" text-anchor="middle">phone audio</text>

  <rect class="box" x="260" y="146" width="150" height="86" fill="#eef2ff" stroke="#4f46e5"/>
  <text class="label" x="335" y="174" text-anchor="middle">Twilio</text>
  <text class="small" x="335" y="197" text-anchor="middle">Media Streams</text>
  <text class="tiny" x="335" y="216" text-anchor="middle">mulaw 8 kHz</text>

  <rect class="box" x="460" y="146" width="180" height="86" fill="#f0fdf4" stroke="#16a34a"/>
  <text class="label" x="550" y="174" text-anchor="middle">FastAPI</text>
  <text class="small" x="550" y="197" text-anchor="middle">/incoming-call</text>
  <text class="tiny" x="550" y="216" text-anchor="middle">/voice-stream</text>

  <rect class="box" x="690" y="146" width="180" height="86" fill="#fff7ed" stroke="#ea580c"/>
  <text class="label" x="780" y="174" text-anchor="middle">CallSession</text>
  <text class="small" x="780" y="197" text-anchor="middle">async queues</text>
  <text class="tiny" x="780" y="216" text-anchor="middle">latency + state</text>

  <path class="arrow" d="M210 189 H252"/>
  <path class="arrow" d="M410 189 H452"/>
  <path class="arrow" d="M640 189 H682"/>

  <rect class="box" x="150" y="316" width="190" height="92" fill="#f0f9ff" stroke="#0284c7"/>
  <text class="label" x="245" y="347" text-anchor="middle">Deepgram</text>
  <text class="small" x="245" y="371" text-anchor="middle">Nova-2 streaming STT</text>
  <text class="tiny" x="245" y="391" text-anchor="middle">audio -> transcript</text>

  <rect class="box" x="400" y="294" width="290" height="136" fill="#f7fee7" stroke="#65a30d"/>
  <text class="label" x="545" y="326" text-anchor="middle">LangGraph Agents</text>
  <text class="small" x="545" y="351" text-anchor="middle">sentiment -> intent -> verification</text>
  <text class="small" x="545" y="376" text-anchor="middle">booking / reschedule / cancel</text>
  <text class="small" x="545" y="401" text-anchor="middle">FAQ / escalation / farewell</text>

  <rect class="box" x="750" y="316" width="200" height="92" fill="#fefce8" stroke="#ca8a04"/>
  <text class="label" x="850" y="347" text-anchor="middle">ElevenLabs</text>
  <text class="small" x="850" y="371" text-anchor="middle">Flash TTS</text>
  <text class="tiny" x="850" y="391" text-anchor="middle">direct ulaw_8000</text>

  <rect class="box" x="990" y="316" width="120" height="92" fill="#eef2ff" stroke="#4f46e5"/>
  <text class="label" x="1050" y="347" text-anchor="middle">Twilio</text>
  <text class="small" x="1050" y="371" text-anchor="middle">playback</text>
  <text class="tiny" x="1050" y="391" text-anchor="middle">mark + clear</text>

  <path class="soft-arrow" d="M780 232 C780 266 420 262 285 314"/>
  <path class="arrow" d="M340 362 H392"/>
  <path class="arrow" d="M690 362 H742"/>
  <path class="arrow" d="M950 362 H982"/>
  <path class="soft-arrow" d="M1050 316 C1044 260 435 256 365 232"/>

  <rect class="box" x="180" y="492" width="210" height="72" fill="#fdf2f8" stroke="#db2777"/>
  <text class="label" x="285" y="520" text-anchor="middle">Guardrails</text>
  <text class="small" x="285" y="544" text-anchor="middle">PII masking, scope, abuse</text>

  <rect class="box" x="450" y="492" width="190" height="72" fill="#f1f5f9" stroke="#475569"/>
  <text class="label" x="545" y="520" text-anchor="middle">SQLite</text>
  <text class="small" x="545" y="544" text-anchor="middle">patients, slots, calls</text>

  <rect class="box" x="700" y="492" width="210" height="72" fill="#ecfdf5" stroke="#059669"/>
  <text class="label" x="805" y="520" text-anchor="middle">Clinic Knowledge</text>
  <text class="small" x="805" y="544" text-anchor="middle">markdown, optional ChromaDB</text>

  <rect class="box" x="970" y="492" width="150" height="72" fill="#faf5ff" stroke="#9333ea"/>
  <text class="label" x="1045" y="520" text-anchor="middle">Streamlit</text>
  <text class="small" x="1045" y="544" text-anchor="middle">ops dashboard</text>

  <path class="soft-arrow" d="M505 430 C470 456 382 464 318 490"/>
  <path class="soft-arrow" d="M545 430 V484"/>
  <path class="soft-arrow" d="M625 430 C665 456 736 464 784 490"/>
  <path class="soft-arrow" d="M640 528 H962"/>

  <text class="tiny" x="72" y="590">Critical path: caller audio -> STT -> agent decision -> TTS -> Twilio playback. Support paths feed scheduling, FAQ grounding, masking, and dashboard visibility.</text>
</svg>
